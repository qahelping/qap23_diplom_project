[tool.pylint.main]
py-version = "3.12"

[tool.pylint.format]
max-line-length = 120

exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    ".pytest_cache",
    ".ruff_cache",
    "build",
    "dist",
    ".eggs",
    "*.egg-info",
]

[tool.pylint."messages control"]
disable = [
    "W3101",
    "missing-module-docstring",
    "missing-class-docstring",
    "missing-function-docstring",
    "too-few-public-methods"
]